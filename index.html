<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>2026: Road to Middle</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #00f2fe;
        --secondary: #4facfe;
        --bg: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: radial-gradient(circle at top right, #1e293b, #0f172a);
        color: #fff;
        font-family: "Roboto", sans-serif;
        margin: 0;
        padding: 15px;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        padding: 25px 15px;
        background: var(--card-bg);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        margin-bottom: 20px;
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 1.8rem;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }

      /* Stats Section */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 2 колонки на мобилках */
        gap: 10px;
        margin-bottom: 25px;
      }

      .stat-card {
        background: var(--card-bg);
        padding: 15px;
        border-radius: 15px;
        border: 1px solid var(--glass-border);
        text-align: center;
      }

      .stat-value {
        font-size: 1.4rem;
        font-weight: bold;
        color: var(--primary);
        display: block;
      }

      .stat-label {
        font-size: 0.8rem;
        opacity: 0.8;
      }

      /* Calendar Grid */
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .day-card {
        background: var(--card-bg);
        padding: 15px 10px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: transform 0.2s;
        text-align: center;
        font-size: 0.9rem;
      }

      .day-card.today {
        border: 2px solid var(--primary);
        background: rgba(0, 242, 254, 0.1);
      }

      /* Modal */
      #day-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .modal-content {
        background: #1e293b;
        padding: 25px;
        border-radius: 20px;
        width: 100%;
        max-width: 450px;
        border: 1px solid var(--primary);
      }

      .task-item {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 18px; /* Больше область нажатия для пальца */
        margin-bottom: 12px;
        border-radius: 12px;
        cursor: pointer;
      }

      .task-item input {
        width: 24px;
        height: 24px;
        margin-right: 15px;
      }

      .close-btn {
        background: linear-gradient(to right, var(--primary), var(--secondary));
        border: none;
        padding: 15px;
        border-radius: 12px;
        color: #000;
        font-weight: bold;
        width: 100%;
        margin-top: 15px;
        font-size: 1rem;
      }

      /* Планшеты и ПК */
      @media (min-width: 768px) {
        h1 {
          font-size: 2.5rem;
        }
        .stats-grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .stat-value {
          font-size: 1.8rem;
        }
        .day-card {
          padding: 20px;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>FUTURE MIDDLE DEV</h1>
        <p style="font-size: 0.9rem; margin-top: 5px; opacity: 0.7">
          15 y.o. • Progress Tracker
        </p>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="days-left">0</span>
          <span class="stat-label">Дней до 2027</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="tasks-completed">0</span>
          <span class="stat-label">Done Tasks</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="days-streak">0</span>
          <span class="stat-label">Дней в пути</span>
        </div>
        <div
          class="stat-card"
          id="gf-card"
          onclick="toggleGF()"
          style="cursor: pointer; transition: 0.3s"
        >
          <span class="stat-value" id="gf-status" style="color: #ff79c6"
            >Searching</span
          >
          <span class="stat-label">Girlfriend Status</span>
        </div>
      </div>

      <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="day-modal">
      <div class="modal-content">
        <h2 id="modal-date" style="color: var(--primary); margin-top: 0"></h2>
        <div class="task-list" id="tasks-container"></div>
        <button class="close-btn" onclick="closeModal()">СОХРАНИТЬ</button>
      </div>
    </div>

    <script>
      const startDate = new Date(2026, 3, 22);
      const endDate = new Date(2027, 0, 1);
      const dailyTasks = [
        "💻 Frontend Coding (Middle Level)",
        "🏋️‍♂️ Work Out (Aesthetic Body)",
        "💧 Water: 7 Glasses",
        "📏 Posture/Height Exercises",
        "💬 Social/Girlfriend Hunt",
      ];

      function init() {
        updateStats();
        renderCalendar();
      }

      function updateStats() {
        const today = new Date();
        const diff = endDate - today;
        document.getElementById("days-left").innerText = Math.max(
          0,
          Math.floor(diff / (1000 * 60 * 60 * 24)),
        );

        const streak =
          Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById("days-streak").innerText =
          streak > 0 ? streak : 0;

        let total = 0;
        for (let i = 0; i < localStorage.length; i++) {
          if (
            localStorage.key(i).includes("-task-") &&
            localStorage.getItem(localStorage.key(i)) === "true"
          ) {
            total++;
          }
        }
        document.getElementById("tasks-completed").innerText = total;
      }

      function renderCalendar() {
        const container = document.getElementById("calendar");
        let current = new Date(startDate);
        const todayStr = new Date().toDateString();

        while (current < endDate) {
          const card = document.createElement("div");
          const dateKey = current.toISOString().split("T")[0];
          const isToday = current.toDateString() === todayStr;

          card.className = `day-card ${isToday ? "today" : ""}`;
          card.innerHTML = `
                <strong>${current.toLocaleDateString("ru-RU", { weekday: "short" })}</strong><br>
                ${current.toLocaleDateString("ru-RU", { day: "numeric", month: "short" })}
            `;

          const dateTitle = current.toLocaleDateString("ru-RU", {
            weekday: "long",
            day: "numeric",
            month: "long",
          });
          card.onclick = () => openModal(dateKey, dateTitle);

          container.appendChild(card);
          current.setDate(current.getDate() + 1);
        }
      }

      function openModal(key, title) {
        document.getElementById("modal-date").innerText = title;
        const container = document.getElementById("tasks-container");
        container.innerHTML = "";

        dailyTasks.forEach((task, index) => {
          const storageKey = `${key}-task-${index}`;
          const isDone = localStorage.getItem(storageKey) === "true";

          const div = document.createElement("div");
          div.className = "task-item";
          div.onclick = (e) => {
            if (e.target.tagName !== "INPUT") {
              const cb = div.querySelector("input");
              cb.checked = !cb.checked;
              save(storageKey, cb.checked);
            }
          };

          div.innerHTML = `
                <input type="checkbox" ${isDone ? "checked" : ""} onchange="save('${storageKey}', this.checked)">
                <span>${task}</span>
            `;
          container.appendChild(div);
        });
        document.getElementById("day-modal").style.display = "flex";
      }

      function save(key, val) {
        localStorage.setItem(key, val);
        updateStats();
      }

      function closeModal() {
        document.getElementById("day-modal").style.display = "none";
      }

      init();

      // Функция переключения статуса отношений
      function toggleGF() {
        const statusEl = document.getElementById("gf-status");
        const cardEl = document.getElementById("gf-card");

        if (statusEl.innerText === "Searching") {
          statusEl.innerText = "FOUND ❤️";
          cardEl.style.background = "rgba(255, 121, 198, 0.2)"; // Розовый оттенок
          localStorage.setItem("gf-status", "found");
        } else {
          statusEl.innerText = "Searching";
          cardEl.style.background = "rgba(255, 255, 255, 0.05)";
          localStorage.setItem("gf-status", "searching");
        }
      }

      // Проверка статуса при загрузке страницы (добавь это внутрь функции init)
      function loadGFStatus() {
        const savedStatus = localStorage.getItem("gf-status");
        if (savedStatus === "found") {
          const statusEl = document.getElementById("gf-status");
          const cardEl = document.getElementById("gf-card");
          statusEl.innerText = "FOUND ❤️";
          cardEl.style.background = "rgba(255, 121, 198, 0.2)";
        }
      }

      // Не забудь вызвать loadGFStatus() внутри твоей основной функции init()!
    </script>
  </body>
</html>
