<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Bishkek Fullstack Dev 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #00f2fe;
        --secondary: #4facfe;
        --accent: #ff79c6;
        --danger: #ff5555;
        --bg: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: radial-gradient(circle at top right, #1e293b, #0f172a);
        color: #fff;
        font-family: "Roboto", sans-serif;
        margin: 0;
        padding: 15px;
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      header {
        text-align: center;
        padding: 20px;
        background: var(--card-bg);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        margin-bottom: 20px;
      }
      h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 1.4rem;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--card-bg);
        padding: 12px;
        border-radius: 15px;
        border: 1px solid var(--glass-border);
        text-align: center;
      }
      .stat-value {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--primary);
        display: block;
      }
      .stat-skipped {
        color: var(--danger) !important;
      }
      .stat-label {
        font-size: 0.7rem;
        opacity: 0.7;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 10px;
      }
      .day-card {
        background: var(--card-bg);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        text-align: center;
        transition: 0.3s;
        position: relative;
      }
      .day-card.skipped {
        border-color: var(--danger);
        background: rgba(255, 85, 85, 0.15);
        opacity: 0.8;
      }
      .day-card.today {
        border: 2px solid var(--primary);
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
      }
      .chill-icon {
        position: absolute;
        top: 4px;
        right: 4px;
        font-size: 0.7rem;
      }

      #day-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .modal-content {
        background: #1e293b;
        padding: 25px;
        border-radius: 20px;
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--primary);
      }
      .task-item {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 14px;
        margin-bottom: 10px;
        border-radius: 10px;
      }
      .task-item input {
        width: 22px;
        height: 22px;
        margin-right: 12px;
      }
      .time-tag {
        margin-left: auto;
        font-size: 0.75rem;
        color: var(--secondary);
        font-weight: bold;
      }
      .close-btn {
        background: linear-gradient(to right, var(--primary), var(--secondary));
        border: none;
        padding: 14px;
        border-radius: 10px;
        color: #000;
        font-weight: bold;
        width: 100%;
        cursor: pointer;
        margin-top: 10px;
      }

      @media (min-width: 768px) {
        h1 {
          font-size: 2rem;
        }
        .stats-grid {
          grid-template-columns: repeat(5, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>BISHKEK FULLSTACK 2026</h1>
        <div
          style="font-size: 0.7rem; color: var(--secondary); margin-top: 5px"
        >
          Timezone: Bishkek (UTC+6)
        </div>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="days-left">0</span
          ><span class="stat-label">До 2027</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="tasks-done">0</span
          ><span class="stat-label">Задач</span>
        </div>
        <div class="stat-card">
          <span class="stat-value stat-skipped" id="days-skipped">0</span
          ><span class="stat-label">Пропуски</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="days-streak">0</span
          ><span class="stat-label">Дней в пути</span>
        </div>
        <div
          class="stat-card"
          id="gf-card"
          onclick="toggleGF()"
          style="cursor: pointer"
        >
          <span class="stat-value" id="gf-status" style="color: var(--accent)"
            >Search</span
          ><span class="stat-label">Girlfriend</span>
        </div>
      </div>

      <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="day-modal">
      <div class="modal-content">
        <h2
          id="modal-date"
          style="color: var(--primary); margin-top: 0; font-size: 1.1rem"
        ></h2>
        <div id="tasks-container"></div>
        <button class="close-btn" onclick="closeModal()">
          СОХРАНИТЬ ПРОГРЕСС
        </button>
      </div>
    </div>

    <script>
      const startDate = new Date(2026, 3, 22);
      const endDate = new Date(2027, 0, 1);

      // Помощник для работы с локальной датой (UTC+6 Бишкек)
      function getLocalDateStr(date) {
        const offset = date.getTimezoneOffset() * 60000;
        return new Date(date.getTime() - offset).toISOString().split("T")[0];
      }

      function getDailyPlan(dateStr) {
        const seed = dateStr.split("-").reduce((a, b) => a + parseInt(b), 0);
        const isChillDay = seed % 6 === 0;
        const totalHours = isChillDay ? 3 : seed % 2 === 0 ? 5 : 6;

        return {
          isChillDay,
          hours: {
            coding: Math.floor(totalHours * 0.6),
            sport: Math.ceil(totalHours * 0.2),
            other: 1,
          },
        };
      }

      function updateStats() {
        const todayStr = getLocalDateStr(new Date());
        let done = 0,
          skipped = 0;
        let curr = new Date(startDate);

        while (getLocalDateStr(curr) <= getLocalDateStr(new Date())) {
          const key = getLocalDateStr(curr);
          let hasAny = false;
          for (let i = 0; i < 5; i++) {
            if (localStorage.getItem(`${key}-task-${i}`) === "true") {
              done++;
              hasAny = true;
            }
          }
          if (!hasAny && key < todayStr) skipped++;
          curr.setDate(curr.getDate() + 1);
        }

        document.getElementById("days-left").innerText = Math.max(
          0,
          Math.floor((endDate - new Date()) / 86400000),
        );
        document.getElementById("tasks-done").innerText = done;
        document.getElementById("days-skipped").innerText = skipped;
        document.getElementById("days-streak").innerText =
          Math.floor((new Date() - startDate) / 86400000) + 1;
      }

      function renderCalendar() {
        const container = document.getElementById("calendar");
        container.innerHTML = "";
        let current = new Date(startDate);
        const todayStr = getLocalDateStr(new Date());

        while (current < endDate) {
          const dateKey = getLocalDateStr(current);
          const isToday = dateKey === todayStr;
          const isPast = dateKey < todayStr;

          let hasActivity = false;
          for (let i = 0; i < 5; i++)
            if (localStorage.getItem(`${dateKey}-task-${i}`) === "true")
              hasActivity = true;

          const isSkipped = isPast && !hasActivity;
          const plan = getDailyPlan(dateKey);

          const card = document.createElement("div");
          card.className = `day-card ${isToday ? "today" : ""} ${isSkipped ? "skipped" : ""}`;
          card.innerHTML = `
                ${plan.isChillDay ? '<span class="chill-icon">🌴</span>' : ""}
                <div style="font-size: 0.65rem; opacity: 0.6;">${current.toLocaleDateString("ru-RU", { weekday: "short" })}</div>
                <div style="font-weight: bold; font-size: 0.9rem;">${current.toLocaleDateString("ru-RU", { day: "numeric", month: "short" })}</div>
            `;

          if (!isSkipped) {
            card.onclick = () =>
              openModal(
                dateKey,
                current.toLocaleDateString("ru-RU", {
                  weekday: "long",
                  day: "numeric",
                  month: "long",
                }),
                plan,
              );
          }

          container.appendChild(card);
          current.setDate(current.getDate() + 1);
        }
      }

      function openModal(key, title, plan) {
        document.getElementById("modal-date").innerText =
          title + (plan.isChillDay ? " 🌴" : "");
        const container = document.getElementById("tasks-container");
        container.innerHTML = "";

        const tasks = [
          { n: `💻 Fullstack Practice`, h: plan.hours.coding },
          { n: `🏋️‍♂️ Aesthetic Body`, h: plan.hours.sport },
          { n: `💧 Water: 7 Glasses`, h: 0 },
          { n: `📏 Posture / Height`, h: 0.5 },
          { n: `💬 Socializing`, h: plan.hours.other },
        ];

        tasks.forEach((t, i) => {
          const sKey = `${key}-task-${i}`;
          const isDone = localStorage.getItem(sKey) === "true";
          const div = document.createElement("div");
          div.className = "task-item";
          div.innerHTML = `
                <input type="checkbox" ${isDone ? "checked" : ""} onchange="localStorage.setItem('${sKey}', this.checked); updateStats(); renderCalendar();">
                <span style="font-size: 0.85rem;">${t.n}</span>
                ${t.h > 0 ? `<span class="time-tag">${t.h}ч</span>` : ""}
            `;
          container.appendChild(div);
        });
        document.getElementById("day-modal").style.display = "flex";
      }

      function toggleGF() {
        const s = document.getElementById("gf-status");
        const c = document.getElementById("gf-card");
        const found = s.innerText !== "FOUND ❤️";
        s.innerText = found ? "FOUND ❤️" : "Search";
        c.style.background = found
          ? "rgba(255, 121, 198, 0.2)"
          : "var(--card-bg)";
        localStorage.setItem("gf-status", found ? "found" : "search");
      }

      function loadGFStatus() {
        if (localStorage.getItem("gf-status") === "found") {
          document.getElementById("gf-status").innerText = "FOUND ❤️";
          document.getElementById("gf-card").style.background =
            "rgba(255, 121, 198, 0.2)";
        }
      }

      function closeModal() {
        document.getElementById("day-modal").style.display = "none";
      }

      // Запуск
      loadGFStatus();
      updateStats();
      renderCalendar();
    </script>
  </body>
</html>
